<div class="patient-card" id="patient-card-{{ patient.id }}" style="border: 1px solid #ccc; padding: 1em; margin: 1em; display: inline-block; width: 30%;">
    <div id="loading-indicator" class="htmx-indicator" style="display:none;">
      ⏳ Cargando...
    </div>
    <div class="patient-actions" style="float: right;">
        <button 
            hx-get="/reception/patient/{{ patient.id }}/confirm-delete"
            hx-target="#modal-container"
            hx-swap="innerHTML"
            style="background: none; border: none; cursor: pointer;"
        >
            🗑️
        </button>
    </div>
    <div class="status-dots">
        <span style="height: 10px; width: 10px; border-radius: 50%; display: inline-block; background-color: {% if 'LIS_OZELLE' in patient.sources_received %}green{% else %}gray{% endif %};" title="Ozelle"></span>
        <span style="height: 10px; width: 10px; border-radius: 50%; display: inline-block; background-color: {% if 'LIS_FUJIFILM' in patient.sources_received %}green{% else %}gray{% endif %};" title="Fujifilm"></span>
        <span style="height: 10px; width: 10px; border-radius: 50%; display: inline-block; background-color: {% if 'LIS_FILE' in patient.sources_received or 'MANUAL' in patient.sources_received %}green{% else %}gray{% endif %};" title="Bautizador"></span>
    </div>
    <div class="patient-info" 
         hx-post="/reception/patient/{{ patient.id }}/inject-to-taller"
         hx-target="#workshop-view" 
         hx-swap="innerHTML"
         hx-indicator="#loading-indicator"
         hx-disabled-elt="this"
         style="cursor: pointer;"
    >
        {% if patient.name and patient.name != "" %}
            <p><strong>{% if patient.session_code %}{{ patient.session_code }} - {% endif %}{{ patient.name }}</strong></p>
            <p>{{ patient.species }}</p>
        {% else %}
            <p><strong>{% if patient.session_code %}{{ patient.session_code }}{% endif %}</strong></p>
        {% endif %}
    </div>
</div>
</div>
