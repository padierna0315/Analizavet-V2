<div id="modal-container" style="
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: flex; align-items: center;
    justify-content: center; z-index: 1000;
">
    <div style="
        background: white; border-radius: 8px; padding: 1.5rem;
        max-width: 480px; width: 90%; box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    ">
        <h2 style="margin: 0 0 1rem 0; font-size: 1.2rem;">
            🔗 Forzar código de sesión
        </h2>

        <div style="margin-bottom: 1rem;">
            <p style="margin: 0 0 0.5rem 0; font-size: 0.85rem; color: #6b7280;">
                <strong>Origen:</strong> {{ item.source }}
            </p>
            <p style="margin: 0 0 0.5rem 0; font-size: 0.85rem; color: #6b7280;">
                <strong>Motivo:</strong> {{ item.rejection_reason }}
            </p>
            <pre style="
                margin: 0.5rem 0 0 0;
                font-size: 0.75rem;
                background: #f8fafc;
                padding: 0.5rem;
                border-radius: 4px;
                max-height: 120px;
                overflow-y: auto;
                white-space: pre-wrap;
                word-break: break-all;
            ">{{ item.raw_data[:500] }}{% if item.raw_data|length > 500 %}...{% endif %}</pre>
        </div>

        <form
            hx-post="/quarantine/{{ item.id }}/force-match"
            hx-target="#quarantine-row-{{ item.id }}"
            hx-swap="outerHTML"
        >
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem;">
                Código de sesión (ej: M5, A105, F2)
            </label>
            <input
                type="text"
                name="session_code"
                required
                placeholder="Ingrese el código..."
                pattern="[A-Z][0-9]+"
                title="Debe comenzar con una letra mayúscula seguida de dígitos (ej: M5, A105)"
                style="
                    width: 100%;
                    padding: 0.5rem;
                    border: 1px solid #cbd5e1;
                    border-radius: 4px;
                    font-size: 0.95rem;
                    box-sizing: border-box;
                "
            />

            <div style="margin-top: 1rem; display: flex; justify-content: flex-end; gap: 0.5rem;">
                <button
                    type="button"
                    hx-get="/reception/close-modal"
                    hx-target="#modal-container"
                    hx-swap="innerHTML"
                    style="
                        background: #e2e8f0;
                        color: #475569;
                        border: none;
                        border-radius: 4px;
                        padding: 0.5rem 1rem;
                        font-size: 0.85rem;
                        cursor: pointer;
                    ">Cancelar</button>
                <button
                    type="submit"
                    style="
                        background: #3b82f6;
                        color: white;
                        border: none;
                        border-radius: 4px;
                        padding: 0.5rem 1rem;
                        font-size: 0.85rem;
                        cursor: pointer;
                    ">Forzar código</button>
            </div>
        </form>
    </div>
</div>
